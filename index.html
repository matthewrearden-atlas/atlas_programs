  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --bg: #050505;
    --surface: #0c0c0c;
    --surface2: #141414;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e8e8e8;
    --text2: #aaaaaa;
    --text3: #666666;
    --text4: #444444;
    --accent1: #C9A84C;

    --amber: #F59E0B;

  #app {

  .logo {

    justify-content: center;

    margin-bottom: 40px;

  .logo-mark {
    width: 40px;
    height: 40px;
    border: 2px solid var(--accent1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent1);
    letter-spacing: -1px;
  }
  .logo-text {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent1);
    text-transform: uppercase;
  }
  .logo-sm {
    gap: 8px;
    justify-content: flex-start;
    margin-bottom: 8px;
  }
  .logo-sm .logo-mark {
    width: 28px;
    height: 28px;
    font-size: 14px;
    border-width: 1.5px;
  }
  .logo-sm .logo-text {

    letter-spacing: 4px;

  }

  .intro h1 {

    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
    line-height: 1.2;
  }
  .intro .subtitle {
    font-size: 14px;
    color: var(--text3);
    margin-bottom: 48px;
    letter-spacing: 0.5px;

  .intro-box {

    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 40px;

  .intro-box p {

    color: var(--text2);
    line-height: 1.75;
    margin-bottom: 16px;
  }

    color: var(--black);
    border: none;
    padding: 16px 44px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    letter-spacing: 0.5px;
    transition: all 0.2s;

  }
  .btn-primary:hover { background: #d4b356; transform: translateY(-1px); }

    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;

    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent1);
    border-radius: 1px;
    transition: width 0.4s ease;

    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .bloc-tag span:first-child { font-size: 16px; }
  .bloc-tag span:last-child {

    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text4);

    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 32px;
    line-height: 1.45;

  .option-btn {

    background: var(--surface);

    border-radius: 10px;
    color: var(--text2);

  .score-pts { font-size: 12px; color: var(--text4); }
  .score-bar {

    background: var(--border);
    border-radius: 2px;

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;

    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .result-card p {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text2);
    margin-bottom: 16px;

    border-radius: 8px;
    border-left: 3px solid;
    margin-bottom: 24px;
    font-style: italic;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text2);

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 14px;

  .meaning-text { font-size: 14px; color: var(--text2); line-height: 1.6; }

    background: var(--bg);
    border-radius: 12px;

  .priority-item {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    align-items: flex-start;

  .priority-item:last-child { margin-bottom: 0; }
  .priority-num {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .priority-text {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;

    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stagger-2 { animation-delay: 0.2s; opacity: 0; }
  .stagger-3 { animation-delay: 0.3s; opacity: 0; }

</style>

  { name:"Érections Nocturnes & Matinales", icon:"🌙" },
  { name:"Érections Réflexogènes", icon:"⚡" },
  { name:"Psychogènes & Contexte Partenaire", icon:"💭" },
  { name:"Contexte Global & Historique", icon:"📋" }
];

const PROFILES = {
  A: {
    name:"Le Purement Mental", color:"#3B82F6", icon:"🧠",
    summary:"Bonne nouvelle : ton corps fonctionne. Tes érections matinales sont là, tu réponds à la stimulation physique. Le \"hardware\" est intact.",
    detail:"Ton défi est ailleurs : c'est ton mental qui bloque le signal. L'anxiété de performance, les pensées parasites, la peur de \"ne pas y arriver\" créent une interférence entre ton cerveau et ton corps.",
    analogy:"C'est comme si tu avais une connexion WiFi parfaite, mais un pare-feu trop agressif qui bloque le signal.",
    meaning:["Tu n'as pas besoin de pilules ou de compléments","Ton système nerveux est \"coincé\" en mode alerte","La solution passe par la gestion du stress et la reconnexion corps-esprit"],
    priorities:["Apprendre à désactiver le mode \"performance\"","Recâbler la réponse de ton système nerveux","Reconstruire ta confiance progressivement"]
  },
  B: {
    name:"La Double Peine", color:"#F59E0B", icon:"⚡",
    summary:"Ton cas est le plus fréquent chez les hommes de 35-55 ans, et aussi le plus mal compris.",
    detail:"Ce qui se passe : tu as probablement une composante physique (sommeil dégradé, stress chronique, possible baisse hormonale ou facteurs cardiovasculaires) ET une couche d'anxiété qui s'est greffée par-dessus.",
    analogy:"Le cercle vicieux classique : un problème physique crée quelques \"pannes\", l'anxiété s'installe, l'anxiété aggrave le problème, et tu ne sais plus ce qui est physique et ce qui est mental.",
    meaning:["Tu dois agir sur les DEUX fronts simultanément","Ignorer la composante physique = échec","Ignorer la composante mentale = échec aussi"],
    priorities:["Optimiser les fondamentaux (sommeil, stress, activité physique)","Investiguer les marqueurs de santé (bilan hormonal, cardiovasculaire)","Travailler le mental EN PARALLÈLE, pas après"]
  },
  C: {
    name:"Le Situationnel", color:"#8B5CF6", icon:"💑",
    summary:"Ton corps fonctionne parfaitement. Érections matinales, masturbation, fantasmes : tout est OK.",
    detail:"Mais avec ta partenaire actuelle, spécifiquement, ça coince. Ce n'est pas un problème d'érection. C'est un problème relationnel qui se manifeste par l'érection.",
    analogy:"Ça peut être une tension non-dite dans le couple, une perte de désir spécifique, un déséquilibre dans la dynamique, ou simplement une routine qui a éteint l'étincelle.",
    meaning:["Les pilules ne résoudront rien (ton corps marche)","Le \"problème\" est un symptôme, pas la cause","La solution passe par le relationnel, pas le médical"],
    priorities:["Identifier ce qui a changé dans ta dynamique de couple","Ouvrir le dialogue (ou le rouvrir) avec ta partenaire","Recréer du désir et de la connexion émotionnelle"]
  },
  D: {
    name:"Le Signal Périphérique", color:"#EF4444", icon:"🔌",
    summary:"Ton cas mérite une attention particulière.",
    detail:"Tu as des érections matinales (donc ton \"test hardware nocturne\" fonctionne), mais ta réponse à la stimulation physique directe est altérée. Ça peut indiquer une atteinte au niveau des nerfs périphériques, ceux qui transmettent le signal \"localement\".",
    analogy:"Important : ce n'est pas un diagnostic médical, mais un signal qui mérite investigation. Certaines causes sont tout à fait traitables.",
    meaning:["Une consultation médicale est recommandée","Parle spécifiquement de ta réponse au toucher à ton médecin","Certaines causes sont tout à fait traitables (diabète mal contrôlé, compression nerveuse...)"],
    priorities:["Consulter un médecin ou urologue pour investigation","Mentionner spécifiquement la différence érections matinales vs réflexe","En attendant, optimiser ce que tu contrôles (sommeil, stress, hygiène de vie)"]
  },
  E: {
    name:"Signal d'alerte", color:"#DC2626", icon:"🚨",
    summary:"Je vais être direct avec toi : tes réponses indiquent que les trois types d'érection sont affectés. Matinales, réflexes, et avec partenaire.",
    detail:"Ce n'est pas \"dans ta tête\". Ton corps t'envoie un signal clair.",
    analogy:"Les troubles érectiles \"complets\" sont souvent un signe précoce de problèmes cardiovasculaires. Les traiter, c'est aussi protéger ta santé globale.",
    meaning:["Une investigation médicale est prioritaire","Les causes peuvent être hormonales, cardiovasculaires, neurologiques, ou médicamenteuses","La bonne nouvelle : une fois la cause identifiée, beaucoup sont traitables"],
    priorities:["Prendre RDV avec ton médecin traitant","Demander un bilan hormonal (testostérone totale et libre)","Évoquer un bilan cardiovasculaire si pas fait récemment"]
  }
};

// State
let phase = 'intro';
let current = 0;
let answers = {};
let scores = {A:0,B:0,C:0,D:0,E:0};
let selectedOption = null;
let animating = false;

function render() {
  const app = document.getElementById('app');
  if (phase === 'intro') app.innerHTML = renderIntro();
  else if (phase === 'quiz') app.innerHTML = renderQuiz();
  else if (phase === 'result') app.innerHTML = renderResult();
  bindEvents();
}

function renderIntro() {
  return `
    <div class="intro fade-in">
      <div class="logo">
        <div class="logo-mark">A</div>
        <span class="logo-text">ATLAS</span>
      </div>
      <h1>Diagnostic DPD</h1>
      <p class="subtitle">Diagnostic du Profil de Dysfonctionnement</p>
      <div class="intro-box">
        <p><strong>25 questions. 5 minutes. Un diagnostic personnalisé.</strong></p>
        <p>Ce questionnaire analyse tes <strong>3 types d'érection</strong> (nocturnes, réflexogènes, psychogènes) pour identifier ton profil et te donner des recommandations concrètes.</p>
        <p>Réponds honnêtement. Personne ne verra tes réponses sauf toi.</p>
      </div>
      <button class="btn-primary" data-action="start">Commencer le diagnostic →</button>
      <p class="disclaimer">Ce diagnostic n'est pas un avis médical. Il ne remplace pas une consultation avec un professionnel de santé.</p>
    </div>`;
}

function renderQuiz() {
  const q = QUESTIONS[current];
  const bloc = BLOCS[q.bloc];
  const pct = (current / QUESTIONS.length) * 100;

  let optsHtml = '';
  q.opts.forEach((o, i) => {
    const cls = selectedOption === i ? 'selected' : (animating && selectedOption !== null ? 'faded' : '');
    optsHtml += `<button class="option-btn ${cls}" data-action="answer" data-index="${i}">${o.t}</button>`;
  });

  return `
    <div class="fade-in">
      <div class="quiz-header">
        <div class="logo logo-sm">
          <div class="logo-mark">A</div>
          <span class="logo-text">DIAGNOSTIC</span>
        </div>
        <span class="quiz-counter">${current + 1}/${QUESTIONS.length}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="bloc-tag">
        <span>${bloc.icon}</span>
        <span>${bloc.name}</span>
      </div>
      <h2 class="question-text">${q.q}</h2>
      <div class="options">${optsHtml}</div>
      ${current > 0 ? '<button class="back-btn" data-action="back">← Question précédente</button>' : ''}
    </div>`;
}

function getResult() {
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  if (scores.E >= 20 && sorted[0][0] === 'E') return { primary:'E', secondary:null };
  if (scores.E >= 20) return { primary:'E', secondary: sorted[0][0] !== 'E' ? sorted[0][0] : sorted[1][0] };
  const [first, second] = sorted;
  const isMixed = first[1] - second[1] <= 3 && second[1] > 0;
  return { primary: first[0], secondary: isMixed ? second[0] : null };
}

function renderResult() {
  const result = getResult();
  const p = PROFILES[result.primary];
  const s = result.secondary ? PROFILES[result.secondary] : null;
  const maxScore = Math.max(...Object.values(scores));

  let scoresHtml = '';
  Object.entries(scores).sort((a,b) => b[1] - a[1]).forEach(([key, val]) => {
    const pr = PROFILES[key];
    const isPrimary = key === result.primary;
    const w = maxScore > 0 ? (val / maxScore) * 100 : 0;
    scoresHtml += `
      <div class="score-row">
        <div class="score-info">
          <span class="score-name${isPrimary ? ' primary' : ''}" style="color:${isPrimary ? pr.color : ''}">${pr.icon} ${pr.name}</span>
          <span class="score-pts">${val} pts</span>
        </div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width:${w}%;background:${isPrimary ? pr.color : '#333'}"></div>
        </div>
      </div>`;
  });

  let meaningHtml = '';
  p.meaning.forEach(m => {
    meaningHtml += `<div class="meaning-item"><span class="meaning-arrow" style="color:${p.color}">→</span><span class="meaning-text">${m}</span></div>`;
  });

  let prioritiesHtml = '';
  p.priorities.forEach((pr, i) => {
    prioritiesHtml += `
      <div class="priority-item">
        <div class="priority-num" style="background:${p.color}18;border:1px solid ${p.color}44;color:${p.color}">${i+1}</div>
        <span class="priority-text">${pr}</span>
      </div>`;
  });

  const mixedLine = s ? `<p class="result-mixed">Profil mixte avec ${s.icon} ${s.name}</p>` : '';
  const disclaimerExtra = result.primary === 'E' ? ' Pour ce profil, une consultation médicale est fortement recommandée.' : '';

  return `
    <div>
      <div class="logo slide-up stagger-1">
        <div class="logo-mark">A</div>
        <span class="logo-text">ATLAS</span>
      </div>

      <div class="slide-up stagger-2" style="text-align:center;margin-bottom:32px">
        <p class="result-label">Ton diagnostic</p>
        <h1 class="result-title" style="color:${p.color}">${p.icon} ${p.name}</h1>
        ${mixedLine}
      </div>

      <div class="scores-box slide-up stagger-3">
        <p class="scores-label">Répartition des scores</p>
        ${scoresHtml}
      </div>

      <div class="result-card slide-up stagger-4">
        <p>${p.summary}</p>
        <p>${p.detail}</p>
        <div class="analogy-box" style="background:${p.color}0a;border-left-color:${p.color}">
          ${p.analogy}
        </div>

        <p class="section-label" style="color:${p.color}">Ce que ça signifie pour toi</p>
        ${meaningHtml}

        <div class="priorities-box">
          <p class="section-label" style="color:${p.color}">Tes 3 priorités</p>
          ${prioritiesHtml}
        </div>
      </div>

      <div class="cta-box slide-up stagger-5">
        <p class="cta-sub">Tu vas recevoir par email</p>
        <p class="cta-main">Ton plan d'action personnalisé</p>
        <button class="btn-primary">Recevoir mon plan d'action →</button>
        <p class="cta-note">Programme ATLAS · Heureux & Vigoureux</p>
      </div>

      <button class="btn-ghost" data-action="restart">Refaire le diagnostic</button>
      <p class="disclaimer">Ce diagnostic n'est pas un avis médical. En cas de doute, consulte un professionnel de santé.${disclaimerExtra}</p>
    </div>`;
}

function bindEvents() {
  document.querySelectorAll('[data-action="start"]').forEach(b => b.onclick = () => { phase='quiz'; render(); });
  document.querySelectorAll('[data-action="restart"]').forEach(b => b.onclick = () => { phase='intro'; current=0; answers={}; scores={A:0,B:0,C:0,D:0,E:0}; selectedOption=null; render(); });
  document.querySelectorAll('[data-action="back"]').forEach(b => b.onclick = goBack);
  document.querySelectorAll('[data-action="answer"]').forEach(b => b.onclick = function() { handleAnswer(parseInt(this.dataset.index)); });
}

function handleAnswer(idx) {
  if (animating) return;
  selectedOption = idx;
  animating = true;
  render();

  const q = QUESTIONS[current];
  const opt = q.opts[idx];
  Object.entries(opt.s).forEach(([k,v]) => { scores[k] = (scores[k]||0) + v; });
  answers[current] = idx;

  setTimeout(() => {
    selectedOption = null;
    animating = false;
    if (current < QUESTIONS.length - 1) { current++; phase = 'quiz'; }
    else { phase = 'result'; }
    render();
  }, 350);
}

function goBack() {
  if (current === 0 || animating) return;
  const prev = answers[current - 1];
  if (prev !== undefined) {
    const opt = QUESTIONS[current-1].opts[prev];
    Object.entries(opt.s).forEach(([k,v]) => { scores[k] -= v; });
    delete answers[current-1];
  }
  current--;
  render();
}

render();
</script>
</body>
</html>
